<header class="topbar">
  <button class="brand-btn" type="button" (click)="goHome()">PetVerse</button>

  <!-- Само за login/register -->
  <nav class="nav" [hidden]="!isAuthPage">
    <button class="nav-btn" type="button" (click)="goRegister()" [hidden]="!isLoginPage">
      Register
    </button>

    <button class="nav-btn" type="button" (click)="goLogin()" [hidden]="!isRegisterPage">
      Login
    </button>
  </nav>

  <!-- За всички други страници -->
  <nav class="nav" [hidden]="isAuthPage">
    <button class="nav-btn" type="button" (click)="goHome()">Home</button>
    <button class="nav-btn" type="button" (click)="goCreatePost()">Create post</button>

    <button
      class="nav-btn"
      type="button"
      (click)="goCreateBusiness()"
      [hidden]="profiles.active().type !== 'user'"
    >
      Create business
    </button>

    <button
      class="nav-btn"
      type="button"
      (click)="goCreateShelter()"
      [hidden]="profiles.active().type !== 'user'"
    >
      Create shelter
    </button>

    <button class="nav-btn" type="button" (click)="goMyProfile()">My profile</button>

    <button
      class="nav-btn"
      type="button"
      (click)="goBackProfile()"
      [hidden]="!profiles.canGoBack()"
    >
      Back to previous profile
    </button>
  </nav>
</header>

<main class="main">
  <router-outlet></router-outlet>
</main>
