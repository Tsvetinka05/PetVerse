<h2>My profile</h2>

<p><strong>Username:</strong> {{ username }}</p>

<h3>Switch to:</h3>

<div style="display: flex; gap: 12px; margin-top: 12px">
  @if (hasBusinessProfile) {
    <button mat-raised-button color="primary" (click)="goToBusiness()">
      Go to Business Profile
    </button>
  } @else {
    <button mat-raised-button color="accent" (click)="goToCreateBusiness()">
      Create business profile
    </button>
  }

  @if (hasShelterProfile) {
    <button mat-raised-button color="primary" (click)="goToShelter()">Go to Shelter Profile</button>
  } @else {
    <button mat-raised-button color="accent" (click)="goToCreateShelter()">
      Create shelter profile
    </button>
  }
</div>
